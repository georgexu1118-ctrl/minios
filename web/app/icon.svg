<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e0a4a"/>
      <stop offset="100%" stop-color="#04020e"/>
    </radialGradient>
    <radialGradient id="orb" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="45%" stop-color="#06a8c4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a4a6e" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="shine" cx="30%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.35"/>
  <!-- Orb -->
  <circle cx="16" cy="16" r="9" fill="url(#orb)" filter="url(#glow)"/>
  <!-- Shine -->
  <circle cx="16" cy="16" r="9" fill="url(#shine)"/>
  <!-- Reflection dot -->
  <circle cx="19.5" cy="20.5" r="1.5" fill="#22d3ee" opacity="0.25"/>
</svg>
